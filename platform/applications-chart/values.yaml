# Platform Applications Chart
# Central management of all platform applications via "Apps of Apps" pattern
#
# Each application can be enabled/disabled by setting enabled: true/false
# Disabled applications will not be deployed (Application resource won't be created)

# Repository configuration
repository:
  url: https://github.com/rprakashdass/homelab-gitops.git
  branch: main

# Namespace where applications are deployed
deploymentNamespace: home

# ArgoCD namespace
argocdNamespace: argocd

# ArgoCD Project name
argocdProject: home

# List of all applications
applications:
  # Messaging & Notifications (Wave 0 - deploy first)
  telegram-bot:
    enabled: true
    description: "Centralized Telegram bot for messaging and commands"
    path: services/messaging/telegram-bot
    syncWave: "0"

  # Bootstrap automations (self-discovering CI/CD)
  hello-world:
    enabled: true
    description: "Daily heartbeat logger — auto-built with self-discovering CI/CD, sends notifications to telegram-bot"
    path: services/automation/hello-world
    syncWave: "1"

  k8s-health-report:
    enabled: true
    description: "Weekly Kubernetes cluster health report"
    path: services/automation/k8s-health-report
    syncWave: "1"

  notion-monthly:
    enabled: true
    description: "Monthly Notion workspace generation (placeholder)"
    path: services/automation/notion-monthly
    syncWave: "1"

  # Planned automations (ready to enable when implemented)
  github-summary:
    enabled: false
    description: "Weekly GitHub activity summary"
    path: services/github-summary
    syncWave: "2"

  backup-job:
    enabled: false
    description: "Daily database backup"
    path: services/backup-job
    syncWave: "2"

  resume-generator:
    enabled: false
    description: "AI-powered resume generator"
    path: services/resume-generator
    syncWave: "2"

  document-summarizer:
    enabled: false
    description: "AI document summarizer"
    path: services/document-summarizer
    syncWave: "2"

  expense-tracker:
    enabled: false
    description: "Personal expense tracking"
    path: services/expense-tracker
    syncWave: "2"

  # Observability (Phase 4)
  prometheus:
    enabled: false
    description: "Prometheus monitoring"
    path: services/prometheus
    syncWave: "0"

  grafana:
    enabled: false
    description: "Grafana dashboards"
    path: services/grafana
    syncWave: "1"

# Global sync policy
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - ServerSideApply=true
  retry:
    limit: 3
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 3m
