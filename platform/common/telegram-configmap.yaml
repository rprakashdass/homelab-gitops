apiVersion: v1
kind: ConfigMap
metadata:
  name: telegram-configmap
  namespace: home
  labels:
    app.kubernetes.io/name: telegram-config
    app.kubernetes.io/component: platform
data:
  # Telegram Bot Service Connection
  TELEGRAM_BOT_HOST: "telegram-bot"
  TELEGRAM_BOT_PORT: "9999"
  TELEGRAM_BOT_URL: "http://telegram-bot:9999"
  TELEGRAM_BOT_NOTIFY_ENDPOINT: "http://telegram-bot:9999/api/notify"
  TELEGRAM_BOT_HEALTH_ENDPOINT: "http://telegram-bot:9999/health"
