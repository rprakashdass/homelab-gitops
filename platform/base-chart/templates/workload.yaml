          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
        {{- end }}
        {{- if .Values.probes.readiness.enabled }}
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        {{- if or .Values.configMap.enabled .Values.secret.enabled .Values.persistence.enabled }}
        volumeMounts:
        {{- if .Values.configMap.enabled }}
        - name: config
          mountPath: {{ .Values.volumeMounts.config.path }}
          readOnly: {{ .Values.volumeMounts.config.readOnly }}
        {{- end }}
        {{- if .Values.secret.enabled }}
        - name: secret
          mountPath: {{ .Values.volumeMounts.secret.path }}
          readOnly: {{ .Values.volumeMounts.secret.readOnly }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        {{- end }}
        {{- if .Values.lifecycle }}
        lifecycle:
          {{- toYaml .Values.lifecycle | nindent 12 }}
        {{- end }}
      {{- if or .Values.configMap.enabled .Values.secret.enabled }}
      volumes:
      {{- if .Values.configMap.enabled }}
      - name: config
        configMap:
          name: {{ include "base.fullname" . }}
      {{- end }}
      {{- if .Values.secret.enabled }}
      - name: secret
        secret:
          secretName: {{ include "base.fullname" . }}
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ {{ .Values.persistence.accessMode }} ]
      storageClassName: {{ .Values.persistence.storageClassName }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
  {{- end }}

{{- else if eq .Values.kind "cronjob" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "base.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "base.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.job.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
      template:
        metadata:
          {{- if or .Values.configMap.enabled .Values.secret.enabled .Values.podAnnotations }}
          annotations:
            {{- if .Values.configMap.enabled }}
            checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
            {{- end }}
            {{- if .Values.secret.enabled }}
            checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
            {{- end }}
            {{- with .Values.podAnnotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          labels:
            {{- include "base.selectorLabels" . | nindent 12 }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          {{- if .Values.serviceAccount.create }}
          serviceAccountName: {{ include "base.serviceAccountName" . }}
          {{- end }}
          {{- if .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          containers:
          - name: {{ include "base.name" . }}
            image: {{ include "base.image" . }}
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            securityContext:
              {{- toYaml .Values.containerSecurityContext | nindent 14 }}
            {{- if .Values.command }}
            command:
              {{- toYaml .Values.command | nindent 14 }}
            {{- end }}
            {{- if .Values.args }}
            args:
              {{- toYaml .Values.args | nindent 14 }}
            {{- end }}
            {{- if .Values.env }}
            env:
              {{- range $key, $value := .Values.env }}
              - name: {{ $key }}
                value: {{ $value | quote }}
              {{- end }}
            {{- end }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
            {{- if or .Values.configMap.enabled .Values.secret.enabled .Values.persistence.enabled }}
            volumeMounts:
            {{- if .Values.configMap.enabled }}
            - name: config
              mountPath: {{ .Values.volumeMounts.config.path }}
              readOnly: {{ .Values.volumeMounts.config.readOnly }}
            {{- end }}
            {{- if .Values.secret.enabled }}
            - name: secret
              mountPath: {{ .Values.volumeMounts.secret.path }}
              readOnly: {{ .Values.volumeMounts.secret.readOnly }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- end }}
          {{- if or .Values.configMap.enabled .Values.secret.enabled .Values.persistence.enabled }}
          volumes:
          {{- if .Values.configMap.enabled }}
          - name: config
            configMap:
              name: {{ include "base.fullname" . }}
          {{- end }}
          {{- if .Values.secret.enabled }}
          - name: secret
            secret:
              secretName: {{ include "base.fullname" . }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          - name: data
            persistentVolumeClaim:
              claimName: {{ include "base.fullname" . }}
          {{- end }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure

