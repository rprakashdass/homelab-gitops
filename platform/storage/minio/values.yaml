# MinIO Official Helm Chart Values
# Repository: https://charts.min.io/
# Chart: minio
# Version: 5.*

mode: standalone

# Root credentials
rootUser: minioadmin
rootPassword: minioadmin

replicas: 1

# MinIO API Service & Ingress
service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  path: /
  hosts:
    - minio.home
  tls: []

# MinIO Console Service & Ingress
consoleService:
  type: ClusterIP
  port: "9001"

consoleIngress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  path: /
  hosts:
    - minio-console.home
  tls: []

# Persistence
persistence:
  enabled: true
  storageClass: local-path
  size: 20Gi

buckets:
  - name: telegram-bot-data
    policy: none
    purge: false

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
