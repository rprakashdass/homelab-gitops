# Telegram Bot Chart Values
# Centralized Telegram bot for messaging and notifications

base-chart:
  kind: deployment
  replicaCount: 1
  fullnameOverride: telegram-bot
  namespace: home

  image:
    repository: ghcr.io/rprakashdass/telegram-bot
    tag: latest # ← pushed by CI when src/ changes
    pullPolicy: Always # Always pull latest tag to get fresh image

  env:
    API_PORT: "9999"
    LOG_LEVEL: "INFO"
    TELEGRAM_BOT_HOST: "telegram-bot"
    TELEGRAM_BOT_PORT: "9999"
    TELEGRAM_BOT_URL: "http://telegram-bot:9999"
    TELEGRAM_BOT_NOTIFY_ENDPOINT: "http://telegram-bot:9999/api/notify"
    TELEGRAM_BOT_HEALTH_ENDPOINT: "http://telegram-bot:9999/health"

  # Reference the telegram-bot-secrets created in infrastructure/security/secrets/
  envFrom:
    - secretRef:
        name: telegram-bot-secrets

  service:
    enabled: true
    type: ClusterIP
    port: 9999
    targetPort: 9999

  probes:
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
    startup:
      enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 3000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  podLabels:
    domain: messaging
    service-type: bot

  podAnnotations:
    description: "Centralized Telegram bot for homelab"

  serviceAccount:
    create: true
    annotations: {}
