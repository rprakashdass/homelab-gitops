# Telegram Bot Chart Values
# Centralized Telegram bot for messaging and notifications

base-chart:
  kind: deployment
  replicaCount: 1
  namespace: home

  image:
    repository: ghcr.io/rprakashdass/telegram-bot
    tag: abc1234def5678  # ← CI auto-updates this
    pullPolicy: IfNotPresent

  env:
    API_PORT: "9999"
    LOG_LEVEL: "INFO"

  service:
    enabled: true
    type: ClusterIP
    port: 9999
    targetPort: 9999

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
    startup:
      enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 3000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  podLabels:
    domain: messaging
    service-type: bot

  podAnnotations:
    description: "Centralized Telegram bot for homelab"

  serviceAccount:
    create: true
    annotations: {}

# NOTE: envFrom is not supported by base-chart template.
# To use secrets, create the Secret separately:
#   kubectl create secret generic telegram-bot-secrets \
#     -n home \
#     --from-literal=TELEGRAM_BOT_TOKEN=<token>
# Then inject via env vars or add support in base-chart template
