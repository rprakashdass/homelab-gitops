# Hello World Chart Values
# Daily heartbeat logger that sends health checks

base-chart:
  kind: cronjob
  schedule: "0 7 * * *" # Daily at 07:00 UTC
  namespace: home

  image:
    repository: ghcr.io/rprakashdass/hello-world
    tag: latest # ← CI pushes when src/ changes

  env:
    TELEGRAM_BOT_HOST: "telegram-bot"
    TELEGRAM_BOT_PORT: "9999"
    TELEGRAM_BOT_URL: "http://telegram-bot:9999"
    TELEGRAM_BOT_NOTIFY_ENDPOINT: "http://telegram-bot:9999/api/notify"
    TELEGRAM_BOT_HEALTH_ENDPOINT: "http://telegram-bot:9999/health"

  # Add --telegram flag to send heartbeat to telegram-bot
  command: ["python", "app.py"]
  args:
    - --format
    - text
    - --telegram

  envFrom:
    - configMapRef:
        name: telegram-configmap

  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

  job:
    backoffLimit: 1
    ttlSecondsAfterFinished: 86400
